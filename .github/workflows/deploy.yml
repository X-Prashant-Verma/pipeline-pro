name: Pipeline Pro

on:
  push:
    branches: 
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/x-prashant-verma/pipeline-pro:latest

jobs:
  flake8-lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
      
      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
    
      - name: flake8 Lint
        uses: py-actions/flake8@v2

  build-and-push:
    needs: flake8-lint
    runs-on: ubuntu-latest
    name: Build Image and Push to Github Images
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
      
      - name: Login to Github
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

  terraform-apply:
    needs: build-and-push
    name: Apply Terraform for AWS
    runs-on: ubuntu-latest
    defaults:
        run:
          working-directory: terraform
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
    
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve

      - name: Save EC2 IP
        run: terraform output -raw ec2_public_ip > ec2_ip.txt

      - name: Upload EC2 IP artifact
        uses: actions/upload-artifact@v4
        with:
            name: ec2-ip
            path: terraform/ec2_ip.txt
        
      - name: Save private key
        run: cp ec2-private-key.pem ../ec2-private-key.pem

      - name: Upload private key artifact
        uses: actions/upload-artifact@v4
        with:
            name: ec2-private-key
            path: ec2-private-key.pem  

  deploy:
    needs: terraform-apply
    runs-on: ubuntu-latest
    name: Deploy the Flask Image on the EC2 instance
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
        
      - name: Download EC2 IP Artifact
        uses: actions/download-artifact@v4
        with:
          name: ec2-ip
          path: .
      
      - name: Download EC2 Private Key Artifact
        uses: actions/download-artifact@v4
        with:
          name: ec2-private-key
          path: .
          
      - name: Set chmod 400 for private key
        run: chmod 400 ec2-private-key.pem
     
      - name: SSH into EC2
        run: |
          ssh -i ec2-private-key.pem -o StrictHostKeyChecking=no ubuntu@$(cat ec2_ip.txt) "
          sudo apt-get update -y &&
          sudo apt-get install -y docker.io &&
          sudo docker pull ghcr.io/x-prashant-verma/pipeline-pro:latest &&
          sudo docker run -d -p 80:5000 ghcr.io/x-prashant-verma/pipeline-pro:latest
          " 